project:
  name: "MetroVision"
  version: "1.0.0"
  description: "Real-time urban scene understanding for intelligent mobility"

model:
  detection_model: "data/models/yolov8n.pt"
  anomaly_model: "data/models/pothole_yolov8.pt"
  device: "mps"           # "mps" for Apple Silicon, "cpu" fallback
  confidence_threshold: 0.45
  iou_threshold: 0.5

video:
  frame_skip: 2           # process every Nth frame (speeds up on Mac)
  display_width: 960
  output_dir: "data/outputs/"

analytics:
  congestion_threshold: 10   # vehicles in ROI = congestion
  heatmap_alpha: 0.6         # overlay transparency
  stats_window_seconds: 10   # rolling window for averaging

  bev_src_points:
    - [200, 400]
    - [760, 400]
    - [960, 540]
    - [0,   540]
  bev_dst_points:
    - [100, 0]
    - [860, 0]
    - [860, 480]
    - [100, 480]

streamlit:
  page_title: "MetroVision — Urban Perception Engine"
  page_icon: "assets/logo.png"
  layout: "wide"
  theme_primary_color: "#1A1F36"