model:
  detection_model: "data/models/yolov8n.pt"
  anomaly_model: "data/models/pothole_yolov8.pt"
  device: "mps"           # "mps" for Apple Silicon, "cpu" fallback
  confidence_threshold: 0.45
  iou_threshold: 0.5

video:
  frame_skip: 2           # process every Nth frame (speeds up on Mac)
  display_width: 960
  output_dir: "data/outputs/"

analytics:
  congestion_threshold: 12   # vehicles in ROI = congestion
  heatmap_alpha: 0.5         # overlay transparency
  stats_window_seconds: 10   # rolling window for averaging

streamlit:
  page_title: "Urban Digital Twin — Perception Engine"
  layout: "wide"